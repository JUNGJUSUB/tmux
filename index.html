<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo List</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .container {
      width: 100%;
      max-width: 560px;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 8px;
    }

    .subtitle {
      color: #6b7280;
      font-size: 0.875rem;
      margin-bottom: 24px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .input-row input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #e5e7eb;
      border-radius: 10px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
      background: #fff;
    }

    .input-row input:focus {
      border-color: #6366f1;
    }

    .btn-add {
      padding: 12px 20px;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .btn-add:hover {
      background: #4f46e5;
    }

    .filters {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .filter-btn {
      padding: 6px 14px;
      border: 2px solid #e5e7eb;
      border-radius: 20px;
      background: #fff;
      font-size: 0.875rem;
      cursor: pointer;
      color: #6b7280;
      transition: all 0.2s;
    }

    .filter-btn.active {
      border-color: #6366f1;
      background: #6366f1;
      color: #fff;
    }

    .todo-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .todo-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #fff;
      border: 2px solid #e5e7eb;
      border-radius: 10px;
      padding: 14px 16px;
      transition: border-color 0.2s, opacity 0.2s;
    }

    .todo-item.done {
      opacity: 0.55;
    }

    .todo-item:hover {
      border-color: #c7d2fe;
    }

    .todo-item input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #6366f1;
      cursor: pointer;
      flex-shrink: 0;
    }

    .todo-text {
      flex: 1;
      font-size: 1rem;
      color: #1f2937;
      word-break: break-word;
      outline: none;
      border: none;
      background: transparent;
      font-family: inherit;
    }

    .todo-item.done .todo-text {
      text-decoration: line-through;
      color: #9ca3af;
    }

    .todo-text:focus {
      background: #f9fafb;
      border-radius: 4px;
      padding: 2px 4px;
    }

    .btn-delete {
      background: none;
      border: none;
      color: #d1d5db;
      font-size: 1.2rem;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 6px;
      transition: color 0.2s, background 0.2s;
      flex-shrink: 0;
    }

    .btn-delete:hover {
      color: #ef4444;
      background: #fee2e2;
    }

    .footer {
      margin-top: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #9ca3af;
      font-size: 0.8rem;
    }

    .btn-clear {
      background: none;
      border: none;
      color: #9ca3af;
      font-size: 0.8rem;
      cursor: pointer;
      text-decoration: underline;
      padding: 0;
    }

    .btn-clear:hover {
      color: #ef4444;
    }

    .empty {
      text-align: center;
      color: #d1d5db;
      padding: 40px 0;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📝 Todo List</h1>
    <p class="subtitle" id="date"></p>

    <div class="input-row">
      <input type="text" id="new-todo" placeholder="할 일을 입력하세요..." maxlength="200">
      <button class="btn-add" onclick="addTodo()">추가</button>
    </div>

    <div class="filters">
      <button class="filter-btn active" onclick="setFilter('all', this)">전체</button>
      <button class="filter-btn" onclick="setFilter('active', this)">미완료</button>
      <button class="filter-btn" onclick="setFilter('done', this)">완료</button>
    </div>

    <div class="todo-list" id="todo-list"></div>

    <div class="footer">
      <span id="count-label"></span>
      <button class="btn-clear" onclick="clearDone()">완료 항목 삭제</button>
    </div>
  </div>

  <script>
    let todos = JSON.parse(localStorage.getItem('todos') || '[]');
    let filter = 'all';
    let nextId = parseInt(localStorage.getItem('nextId') || '1');

    function save() {
      localStorage.setItem('todos', JSON.stringify(todos));
      localStorage.setItem('nextId', String(nextId));
    }

    function addTodo() {
      const input = document.getElementById('new-todo');
      const text = input.value.trim();
      if (!text) return;
      todos.push({ id: nextId++, text, done: false });
      save();
      input.value = '';
      render();
      input.focus();
    }

    function toggleTodo(id) {
      const todo = todos.find(t => t.id === id);
      if (todo) todo.done = !todo.done;
      save();
      render();
    }

    function deleteTodo(id) {
      todos = todos.filter(t => t.id !== id);
      save();
      render();
    }

    function updateText(id, text) {
      const todo = todos.find(t => t.id === id);
      if (todo) todo.text = text.trim() || todo.text;
      save();
    }

    function clearDone() {
      todos = todos.filter(t => !t.done);
      save();
      render();
    }

    function setFilter(f, btn) {
      filter = f;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    }

    function render() {
      const list = document.getElementById('todo-list');
      const filtered = todos.filter(t =>
        filter === 'all' ? true : filter === 'done' ? t.done : !t.done
      );

      if (filtered.length === 0) {
        list.innerHTML = '<div class="empty">할 일이 없습니다 🎉</div>';
      } else {
        list.innerHTML = filtered.map(t => `
          <div class="todo-item ${t.done ? 'done' : ''}">
            <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggleTodo(${t.id})">
            <input
              class="todo-text"
              value="${escapeAttr(t.text)}"
              onblur="updateText(${t.id}, this.value)"
              onkeydown="if(event.key==='Enter')this.blur()"
            >
            <button class="btn-delete" onclick="deleteTodo(${t.id})" title="삭제">✕</button>
          </div>
        `).join('');
      }

      const active = todos.filter(t => !t.done).length;
      document.getElementById('count-label').textContent =
        `총 ${todos.length}개 · 미완료 ${active}개`;
    }

    function escapeAttr(str) {
      return str.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    document.getElementById('new-todo').addEventListener('keydown', e => {
      if (e.key === 'Enter') addTodo();
    });

    document.getElementById('date').textContent = new Date().toLocaleDateString('ko-KR', {
      year: 'numeric', month: 'long', day: 'numeric', weekday: 'long'
    });

    render();
  </script>
</body>
</html>
